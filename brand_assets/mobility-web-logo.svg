<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 116" aria-label="Mobility Web">
  <!-- Hexagon frame -->
  <polygon points="57,12 96.8,35 96.8,81 57,104 17.2,81 17.2,35" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.7"/>
  <!-- Blue spokes (vertical) -->
  <line x1="57" y1="58" x2="57"   y2="12"  stroke="#0078CE" stroke-width="1.9"/>
  <line x1="57" y1="58" x2="57"   y2="104" stroke="#0078CE" stroke-width="1.9"/>
  <!-- Grey spokes -->
  <line x1="57" y1="58" x2="96.8" y2="35"  stroke="rgba(255,255,255,0.75)" stroke-width="1.7"/>
  <line x1="57" y1="58" x2="96.8" y2="81"  stroke="rgba(255,255,255,0.75)" stroke-width="1.7"/>
  <line x1="57" y1="58" x2="17.2" y2="81"  stroke="rgba(255,255,255,0.75)" stroke-width="1.7"/>
  <line x1="57" y1="58" x2="17.2" y2="35"  stroke="rgba(255,255,255,0.75)" stroke-width="1.7"/>
  <!-- Blue nodes -->
  <circle cx="57"   cy="12"  r="4.8" fill="#0078CE"/>
  <circle cx="96.8" cy="35"  r="4.8" fill="#0078CE"/>
  <circle cx="57"   cy="104" r="4.8" fill="#0078CE"/>
  <!-- White nodes -->
  <circle cx="96.8" cy="81"  r="4.8" fill="rgba(255,255,255,0.85)"/>
  <circle cx="17.2" cy="81"  r="4.8" fill="rgba(255,255,255,0.85)"/>
  <circle cx="17.2" cy="35"  r="4.8" fill="rgba(255,255,255,0.85)"/>
  <!-- Centre node -->
  <circle cx="57"   cy="58"  r="5.8" fill="rgba(255,255,255,0.9)"/>
  <!-- Wordmark — single line -->
  <text x="114" y="70"  font-family="Outfit,sans-serif" font-weight="700" font-size="34" fill="white">MOBILITY WEB</text>
  <!-- Tagline — stretched to match wordmark width exactly -->
  <text x="114" y="86"  font-family="Outfit,sans-serif" font-weight="400" font-size="10.5" fill="#0078CE" textLength="240" lengthAdjust="spacing">OPEN MOBILITY NETWORK</text>
</svg>
